# -------------------------------------------------------
# praveenshahi.in — landing page + projects
# -------------------------------------------------------
server {
    listen 80;
    server_name praveenshahi.in www.praveenshahi.in;

    # landing page (static)
    root /var/www/salesauditool/landing;
    index index.html;

    # salesauditool — strip prefix, proxy to FastAPI
    location = /projects/salesauditool {
        return 301 /projects/salesauditool/;
    }

    location /projects/salesauditool/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
