<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Brain — Call Audit Engine</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #888;
    }

    .form-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 28px;
    }

    .context-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .context-row { grid-template-columns: 1fr; }
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    select, input[type="text"], textarea {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 0.9rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input[type="text"]:focus, textarea:focus {
      border-color: #555;
    }

    select option { background: #1a1a1a; }

    .transcript-wrap { margin-bottom: 20px; }

    textarea {
      resize: vertical;
      min-height: 220px;
      font-family: inherit;
      line-height: 1.5;
    }

    textarea::placeholder { color: #444; }

    button#submitBtn {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #0f0f0f;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button#submitBtn:hover { opacity: 0.88; }
    button#submitBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner {
      display: none;
      text-align: center;
      padding: 30px 0;
      color: #666;
      font-size: 0.88rem;
    }

    .spinner.visible { display: block; }

    #reportSection { display: none; margin-top: 36px; }
    #reportSection.visible { display: block; }

    .report-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .report-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button#shareBtn {
      padding: 8px 16px;
      background: transparent;
      color: #e8e8e8;
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    button#shareBtn:hover { border-color: #888; color: #fff; }
    button#shareBtn.copied { border-color: #4caf50; color: #4caf50; }

    .report-body {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 32px;
      line-height: 1.75;
    }

    /* Markdown rendered content */
    .report-body h1, .report-body h2, .report-body h3 {
      color: #fff;
      margin: 1.4em 0 0.5em;
      font-weight: 700;
      line-height: 1.3;
    }
    .report-body h1 { font-size: 1.3rem; }
    .report-body h2 { font-size: 1.1rem; }
    .report-body h3 { font-size: 1rem; color: #ddd; }

    .report-body p { margin: 0.7em 0; color: #d4d4d4; }
    .report-body strong { color: #fff; }
    .report-body em { color: #bbb; }

    .report-body ul, .report-body ol {
      padding-left: 1.4em;
      margin: 0.6em 0;
      color: #d4d4d4;
    }

    .report-body li { margin: 0.3em 0; }

    .report-body hr {
      border: none;
      border-top: 1px solid #2e2e2e;
      margin: 1.6em 0;
    }

    .report-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 0.88rem;
    }

    .report-body th {
      background: #222;
      color: #aaa;
      font-weight: 600;
      text-align: left;
      padding: 9px 12px;
      border: 1px solid #333;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.4px;
    }

    .report-body td {
      padding: 9px 12px;
      border: 1px solid #2a2a2a;
      color: #d4d4d4;
      vertical-align: top;
    }

    .report-body tr:hover td { background: #1f1f1f; }

    .error-msg {
      display: none;
      background: #2a1515;
      border: 1px solid #5a2020;
      border-radius: 6px;
      padding: 12px 16px;
      color: #f08080;
      font-size: 0.88rem;
      margin-top: 14px;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Sales Brain</h1>
      <p>Paste a call transcript. Get a structured audit report in seconds.</p>
    </header>

    <div class="form-card">
      <div class="context-row">
        <div>
          <label for="segment">Segment</label>
          <select id="segment">
            <option value="">— optional —</option>
            <option value="Edtech B2C">Edtech B2C</option>
            <option value="Fintech/Insurance B2C">Fintech / Insurance B2C</option>
            <option value="Other B2C">Other B2C</option>
          </select>
        </div>
        <div>
          <label for="product">Product / Course</label>
          <input type="text" id="product" placeholder="e.g. Data Science Pro" />
        </div>
        <div>
          <label for="ticket_size">Ticket Size</label>
          <select id="ticket_size">
            <option value="">— optional —</option>
            <option value="Sub ₹20k">Sub ₹20k</option>
            <option value="₹20k–₹1L">₹20k – ₹1L</option>
            <option value="₹1L+">₹1L+</option>
          </select>
        </div>
      </div>

      <div class="transcript-wrap">
        <label for="transcript">Call Transcript</label>
        <textarea id="transcript" placeholder="Paste your call transcript here. Include speaker labels if available (e.g. Rep: ... / Prospect: ...)."></textarea>
      </div>

      <button id="submitBtn" onclick="runAudit()">Run Audit</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="spinner" id="spinner">Analysing call... this takes 15–30 seconds.</div>

    <div id="reportSection">
      <div class="report-header">
        <h2>Audit Report</h2>
        <button id="shareBtn" onclick="copyShareLink()">Copy shareable link</button>
      </div>
      <div class="report-body" id="reportBody"></div>
    </div>
  </div>

  <script>
    let currentReportId = null;

    async function runAudit() {
      const transcript = document.getElementById("transcript").value.trim();
      const segment = document.getElementById("segment").value;
      const product = document.getElementById("product").value.trim();
      const ticket_size = document.getElementById("ticket_size").value;

      const errorMsg = document.getElementById("errorMsg");
      errorMsg.classList.remove("visible");

      if (!transcript) {
        errorMsg.textContent = "Please paste a transcript before running the audit.";
        errorMsg.classList.add("visible");
        return;
      }

      const btn = document.getElementById("submitBtn");
      const spinner = document.getElementById("spinner");
      const reportSection = document.getElementById("reportSection");

      btn.disabled = true;
      spinner.classList.add("visible");
      reportSection.classList.remove("visible");

      try {
        const res = await fetch("/audit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ transcript, segment, product, ticket_size }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Something went wrong.");
        }

        const data = await res.json();
        currentReportId = data.id;

        document.getElementById("reportBody").innerHTML = marked.parse(data.report);
        reportSection.classList.add("visible");
        reportSection.scrollIntoView({ behavior: "smooth", block: "start" });

        const shareBtn = document.getElementById("shareBtn");
        shareBtn.textContent = "Copy shareable link";
        shareBtn.classList.remove("copied");
      } catch (e) {
        errorMsg.textContent = e.message;
        errorMsg.classList.add("visible");
      } finally {
        btn.disabled = false;
        spinner.classList.remove("visible");
      }
    }

    async function copyShareLink() {
      if (!currentReportId) return;
      const url = `${window.location.origin}/report/${currentReportId}`;
      await navigator.clipboard.writeText(url);
      const btn = document.getElementById("shareBtn");
      btn.textContent = "Copied!";
      btn.classList.add("copied");
      setTimeout(() => {
        btn.textContent = "Copy shareable link";
        btn.classList.remove("copied");
      }, 2000);
    }

    // If visiting a /report/:id URL directly, load and render it
    async function loadSharedReport() {
      const match = window.location.pathname.match(/^\/report\/([a-f0-9-]{36})$/);
      if (!match) return;

      const reportId = match[1];
      document.querySelector(".form-card").style.display = "none";

      const spinner = document.getElementById("spinner");
      spinner.classList.add("visible");

      try {
        const res = await fetch(`/report/${reportId}`);
        if (!res.ok) throw new Error("Report not found.");
        const data = await res.json();
        currentReportId = data.id;
        document.getElementById("reportBody").innerHTML = marked.parse(data.report);
        document.getElementById("reportSection").classList.add("visible");
      } catch (e) {
        spinner.textContent = e.message;
      } finally {
        spinner.classList.remove("visible");
      }
    }

    loadSharedReport();
  </script>
</body>
</html>
